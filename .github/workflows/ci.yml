name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.85.0"]
    defaults:
      run:
        working-directory: crates/iso-parser
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --component rustfmt,clippy
          rustup override set ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/iso-parser -> target"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features --locked

  cargo-deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/iso-parser/Cargo.toml
          command: check
          arguments: --config ../../deny.toml

  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal && rustup override set 1.85.0
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7
      - name: Generate SBOM
        working-directory: crates/iso-parser
        run: cargo cyclonedx --format json --output-cdx
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: crates/iso-parser/**/bom.json
          retention-days: 90

  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (semgrep p/rust)
    runs-on: ubuntu-22.04
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config=p/rust --config=p/security-audit --error --sarif --output semgrep.sarif .
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30

  nix-smoke:
    name: Nix flake smoke-build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check --no-build
      - run: nix develop --command cargo --version
