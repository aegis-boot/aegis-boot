name: OVMF SecBoot

on:
  # #580 Phase 1: skip on docs-only PRs. See kexec-e2e.yml for rationale.
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  workflow_dispatch:

# Phase 1 of issue #16: validate the OVMF SecBoot environment in CI by
# launching QEMU with the MS-enrolled Ubuntu OVMF variables and asserting
# the firmware loads cleanly. Phase 2 (real signed shim+kernel chain) is
# tracked separately.

jobs:
  ovmf-secboot-foundation:
    name: OVMF SecBoot foundation
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      # #615: cache the apt-installed QEMU + OVMF (foundation smoke
      # only — minimal package set; full signed chain lives in the
      # second job below).
      - name: Install QEMU + OVMF (with MS-enrolled vars)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # v1.6.0
        with:
          packages: qemu-system-x86 ovmf
          version: '1.0'
      - name: Verify OVMF SecBoot artifacts present
        run: |
          ls -l /usr/share/OVMF/OVMF_CODE_4M.secboot.fd \
                /usr/share/OVMF/OVMF_VARS_4M.ms.fd

      - name: Run OVMF SecBoot foundation smoke
        env:
          TIMEOUT_SECONDS: "30"
        run: ./scripts/ovmf-secboot-smoke.sh

  ovmf-secboot-e2e:
    name: OVMF SecBoot E2E (signed chain → rescue-tui)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      # #615: cache the apt-installed signed boot chain + tooling. Note
      # this job uses linux-image-generic (vs -virtual elsewhere) — the
      # full SB E2E needs the same kernel-image variant the rescue-tui
      # eventually loads, not the lighter virtual one.
      - name: Install signed boot chain + tooling
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # v1.6.0
        with:
          packages: qemu-system-x86 ovmf shim-signed grub-efi-amd64-signed linux-image-generic mtools dosfstools exfatprogs gdisk busybox-static cpio
          version: '1.0'
      - name: Make kernel/initrd readable for mcopy
        run: |
          # Kernels under /boot are typically 0600; SB E2E needs them readable.
          sudo chmod 0644 /boot/vmlinuz-*-generic /boot/initrd.img-*-generic || true

      - name: Install Rust toolchain (pinned)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.88.0 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build rescue-tui (release)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: cargo build --release -p rescue-tui

      - name: Build initramfs
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: ./scripts/build-initramfs.sh

      - name: Run OVMF SecBoot E2E
        env:
          TIMEOUT_SECONDS: "120"
        run: ./scripts/ovmf-secboot-e2e.sh
